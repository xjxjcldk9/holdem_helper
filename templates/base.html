<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Holdem Helper{% endblock %}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♠</text></svg>" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Holdem" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: {
              DEFAULT: '#0f1117',
              card:    '#161b27',
              hover:   '#1c2333',
              input:   '#1a2035',
              border:  '#2a3348',
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { background-color: #0f1117; }

    .btn-primary {
      background-color: #f59e0b;
      color: #000;
      font-weight: 600;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      transition: background-color 0.15s, transform 0.1s;
      border: none;
      cursor: pointer;
    }
    .btn-primary:hover { background-color: #fbbf24; }
    .btn-primary:active { transform: scale(0.96); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .btn-secondary {
      background-color: #1c2333;
      color: #cbd5e1;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      transition: background-color 0.15s, color 0.15s;
      border: none;
      cursor: pointer;
    }
    .btn-secondary:hover { background-color: #2a3348; color: #fff; }

    .input-field {
      width: 100%;
      background-color: #1a2035;
      border: 1px solid #2a3348;
      border-radius: 0.5rem;
      padding: 0.5rem 0.75rem;
      color: #f1f5f9;
      font-size: 0.875rem;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .input-field::placeholder { color: #475569; }
    .input-field:focus {
      outline: none;
      border-color: rgba(245, 158, 11, 0.6);
      box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.15);
    }

    .card {
      background-color: #161b27;
      border: 1px solid #2a3348;
      border-radius: 0.75rem;
    }
  </style>
</head>
<body class="text-slate-100 font-sans min-h-screen antialiased">

  {% block content %}{% endblock %}

  <!-- Toast container -->
  <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2 pointer-events-none"></div>

  <script>
    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const colors = {
        success: 'bg-green-500/90 text-white',
        error:   'bg-red-500/90 text-white',
        info:    'bg-slate-700/95 text-white',
      };
      const toast = document.createElement('div');
      toast.className = `pointer-events-auto px-4 py-3 rounded-xl text-sm font-medium shadow-xl backdrop-blur-sm transition-all duration-300 translate-y-2 opacity-0 ${colors[type] || colors.info}`;
      toast.textContent = message;
      container.appendChild(toast);
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          toast.classList.remove('translate-y-2', 'opacity-0');
        });
      });
      setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-y-2');
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
